<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 380px;
      min-height: 500px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: #6b7280;
    }

    .auth-section {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .search-section {
      margin-bottom: 20px;
    }

    .quota-info {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #0c4a6e;
    }

    .subscription-info {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tier-display {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #current-tier {
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      flex: 1;
    }

    .btn-upgrade {
      background: #10b981;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-upgrade:hover {
      background: #059669;
    }

    .progress-container {
      margin: 16px 0;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    .results-section {
      margin-top: 20px;
    }

    .result-item {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .result-name {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .result-details {
      color: #6b7280;
      line-height: 1.4;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    .hidden {
      display: none;
    }

    .link-btn {
      background: none;
      border: none;
      color: #3b82f6;
      text-decoration: underline;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-top: 8px;
    }

    .export-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .filter-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background: white;
    }

    .filter-select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .filter-select:disabled {
      background: #f9fafb;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .pro-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 4px;
      font-size: 11px;
    }

    .pro-text {
      color: #92400e;
      font-weight: 500;
    }

    .mini-upgrade-btn {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .mini-upgrade-btn:hover {
      background: #d97706;
    }

    .filter-count {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #1e40af;
    }

    .no-website-badge {
      display: inline-block;
      background: #fed7aa;
      color: #ea580c;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">LeadFinder</div>
      <div class="tagline">AI-Powered Business Lead Generation</div>
    </div>

    <!-- Authentication Section -->
    <div id="auth-section" class="auth-section">
      <div id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button id="login-btn" class="btn btn-primary">Sign In</button>
        <button id="show-signup" class="link-btn">Don't have an account? Sign up</button>
      </div>

      <div id="signup-form" class="hidden">
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a password">
        </div>
        <button id="signup-btn" class="btn btn-primary">Sign Up</button>
        <button id="show-login" class="link-btn">Already have an account? Sign in</button>
      </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" class="hidden">
      <div id="quota-info" class="quota-info"></div>

      <!-- Added subscription tier display and upgrade button -->
      <div id="subscription-info" class="subscription-info">
        <div class="tier-display">
          <span id="current-tier">Free Plan</span>
          <button id="upgrade-btn" class="btn-upgrade">Upgrade</button>
        </div>
      </div>

      <div class="search-section">
        <div class="form-group">
          <label for="search-query">Business Type</label>
          <input type="text" id="search-query" placeholder="e.g., restaurants, dentists, plumbers">
        </div>
        <div class="form-group">
          <label for="search-location">Location</label>
          <input type="text" id="search-location" placeholder="e.g., New York, NY">
        </div>

        <!-- Added website filter dropdown for pro/enterprise users -->
        <div class="form-group" id="website-filter-group">
          <label for="website-filter">Website Filter</label>
          <select id="website-filter" class="filter-select">
            <option value="all">All businesses</option>
            <option value="no-website">No website only</option>
            <option value="has-website">Has website only</option>
          </select>
          <div id="filter-pro-badge" class="pro-badge hidden">
            <span class="pro-text">Pro Feature</span>
            <button id="filter-upgrade-btn" class="mini-upgrade-btn">Upgrade</button>
          </div>
        </div>

        <div class="form-group">
          <label for="max-results">Number of Results (1-20)</label>
          <input type="number" id="max-results" min="1" max="20" value="20">
        </div>

        <!-- Added progress bar for search feedback -->
        <div id="search-progress" class="progress-container hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div id="progress-text" class="progress-text">Searching for leads...</div>
        </div>

        <button id="search-btn" class="btn btn-primary">Find Leads</button>
      </div>

      <div class="export-section">
        <button id="export-btn" class="btn btn-secondary">Export All Leads to CSV</button>
        <button id="logout-btn" class="link-btn">Sign Out</button>
      </div>

      <div id="results-section" class="results-section hidden">
        <h3>Search Results</h3>
        <div id="results-container"></div>
      </div>
    </div>

    <div id="error-message" class="error hidden"></div>
    <div id="success-message" class="success hidden"></div>
    <div id="loading" class="loading hidden">Loading...</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
